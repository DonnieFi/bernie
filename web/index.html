<body data-theme="dark">
  <div id="app" class="app">
    <!-- Rendered via JS -->
  </div>

  <div id="login-overlay">
    <div class="brand-mark is-large"></div>
    <div style="text-align: center;">
      <div class="brand-name" style="font-size: 2rem;">bernie</div>
      <div class="brand-sub">Command Center</div>
    </div>
    
    <div id="login-avatar-grid" style="display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; max-width: 300px; margin: 20px auto;"></div>
    
    <form id="login-form" style="display: none; align-items: center; flex-direction: column;">
      <div id="login-selected-user" style="font-weight: 600; margin-bottom: 12px; color: var(--ink-1);"></div>
      <input type="password" id="login-token" placeholder="Password / PIN" required style="text-align: center; letter-spacing: .1em; font-size: 20px; width: 100%;" />
      <button type="submit" id="login-submit" style="margin-top: 12px; width: 100%;">Unlock</button>
      <button type="button" id="login-back" class="btn" style="margin-top: 8px; width: 100%; background: transparent; color: var(--ink-2); border: none;">Back</button>
      <div id="login-err"></div>
    </form>
  </div>
